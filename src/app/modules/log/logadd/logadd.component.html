<div class="main-content-inner">
  <div class="col-12 mt-4">
    <div class="row mb-3 align-items-center">
      <div class="col-6">
        <h4 style="color:rgba(31, 97, 141); font-weight: 700;"> Create Log </h4>
      </div>
    </div>

    <!-- SEARCH SECTION -->
    <div class="card mb-4 border-0 shadow-sm">
      <div class="card-body">
        <div class="row justify-content-center">
          <div class="col-md-8 d-flex align-items-center">
            <input type="text" class="form-control me-2" placeholder="Search by Name or Mobile..."
                   [(ngModel)]="searchQuery" (keyup.enter)="searchStudent()">
            <button type="button" class="btn btn-primary px-4" (click)="searchStudent()">
              <i class="fa fa-search me-1"></i> Search
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- STUDENT LIST TABLE (Visible if results exist) -->
    <div class="card mb-4 border-0  " *ngIf="searchedStudents.length > 0">
      <div class="table-responsive">
        <table class="table table-bordered table-hover text-center mb-0">
          <thead class="bg-light">
            <tr>
              <th>Student Name</th>
              <th>Father Name</th>
              <th>Contact No</th>
              <th>Standard</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of searchedStudents" [class.table]="selectedStudent?.studentmasterid === s.studentmasterid">
              <td class="font-weight-bold">{{s.studentname}}</td>
              <td>{{s.fathername}}</td>
              <td>{{s.fatherphoneno}}</td>
              <td>{{s.standard}}</td>
              <td>
                <button type="button" class="btn btn-success btn-sm px-3" (click)="selectStudent(s)">
                    Log hours
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PAYMENT WORKFLOW (Appears below the table) -->
    <div class="card border-0 shadow-sm" *ngIf="selectedStudent">
      <div class="card-body p-4">

        <div class="p-2 mb-3 text-dark" style="background-color: #d1e2f3;">
          <h6 class="m-0 font-weight-bold">Student Profile Details</h6>
        </div>

        <div class="row">
          <div class="col-lg-6">
            <div class="form-group row">
              <label class="col-sm-4 col-form-label text-right"><b>Student Name</b></label>
              <div class="col-sm-8">
                <input type="text" class="form-control bg-light" [value]="selectedStudent.studentname" readonly>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="form-group row">
              <label class="col-sm-4 col-form-label text-right"><b>GR Number</b></label>
              <div class="col-sm-8">
                <input type="text" class="form-control bg-light" [value]="selectedStudent.grnumber" readonly>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-2">
          <div class="col-lg-6">
            <div class="form-group row">
              <label class="col-sm-4 col-form-label text-right"><b><span class="text-danger mr-1">*</span>Program Name</b></label>
              <div class="col-sm-8">
                <ng-select [(ngModel)]="admissionEditDetails.standardid" name="standardid" placeholder="Select Standard" readonly="[true]" required>
                  <ng-option *ngFor="let prog of standardList" [value]="prog.websettingsid">
                    {{prog.value}}
                  </ng-option>
                </ng-select>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="form-group row">
              <label class="col-sm-4 col-form-label text-right"><b>Contact No</b></label>
              <div class="col-sm-8">
                <input type="text" class="form-control bg-light" [value]="selectedStudent.fatherphoneno" readonly>
              </div>
            </div>
          </div>
        </div>

        



        <!-- Hours ENTRY -->
        <form #LogForm="ngForm" novalidate>
          <div class="p-2 mb-3 mt-4 text-dark" style="background-color: #d1e2f3;">
            <h6 class="m-0 font-weight-bold">Log  Entry</h6>
          </div>

          <div class="row mt-2">

            <div class="col-lg-6">
              <div class="form-group row">
                <label class="col-sm-4 col-form-label text-right"><b><span class="text-danger mr-1">*</span>Log Date</b></label>
                <div class="col-sm-8">
                  <ejs-datepicker format='dd-MM-yyyy' name="logdate" [(ngModel)]='LogAddDetails.logdate' required></ejs-datepicker>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="form-group row">
                <label class="col-sm-4 col-form-label text-right"><b>Log Hours</b></label>
                <div class="col-sm-8">
                  <input class="form-control" type="text" name="loghours" placeholder="Log Hours"
                         [(ngModel)]="LogAddDetails.loghours">
                </div>
              </div>
            </div>
          </div>

           

          <div class="row mt-4 pb-4">
            <div class="col-lg-12 text-right">
              <hr>
              <button type="submit" class="btn btn-success px-4" (click)="CreateLog(LogForm)">
                <i class="fa fa-save"></i> Save log Hrs
              </button>
              <button type="button" class="btn btn-dark ml-2 px-4" (click)="selectedStudent = null">
                Cancel
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
