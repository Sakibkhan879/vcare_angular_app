

<div class="main-content-inner" >

  <div class="main-content-inner">
    <div class="col-12 mt-4">

      <div class="row mb-3 align-items-center">
        <div class="col-lg-6">
          <h5 style="color:rgba(31, 97, 141); margin:0;">
          Payment List
          </h5>
        </div>
        <div class="col-lg-6 text-right">
          <button class="btn btn-success btn-sm" (click)="openMakePayment()">
            <i class="fa fa-plus"></i> Make Payment
          </button>
        </div>
      </div>

      <div class="data-tables">
        <table class="erp-datatable table table-bordered table-hover text-center">
          <thead class="bg-light text-capitalize">
            <tr>
              <th>Payment Number</th>
              <th>Student Name</th>

              <th>Payment Mode</th>
              <th>Amount</th>
              <th>Date</th>
              <th style="width:120px;">Action</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let item of paymentList">
              <td>{{item.paymentnumber}}</td>
              <td>{{item.studentname}}</td>
              <td>{{item.paymentmode}}</td>
              <td>{{item.totalamount}}</td>
              <td>{{item.paymentdate }}</td>

              <td>
                <ul class="d-flex justify-content-center list-unstyled mb-0">
                  <li class="mr-2">
                    <a href="javascript:void(0)" (click)="editPage(item)" class="text-secondary"><i class="fa fa-edit"></i></a>
                  </li>

                  <li>
                    <a href="javascript:void(0)" (click)="openDeleteModel(item )" class="text-danger"><i class="ti-trash"></i></a>
                  </li>
                </ul>
              </td>
            </tr>
          </tbody>
        </table>

        <div *ngIf="paymentList.length === 0" class="text-center p-5 border">
          <p class="text-muted">No payment records found. Click "Make Payment" to start.</p>
        </div>
      </div>

    </div>
  </div>
</div>



<ngx-smart-modal [customClass]="'nsm-centered'" #deleteModalPopup identifier="deleteModalPopup">
  <div class="modal-content border-0">
    <div class="modal-body text-center">
      <h6 class="mt-3">Do you want to delete this payment record?</h6>
    </div>
    <div class="row mt-3 mb-3 justify-content-center">
      <div class="col-auto">
        <button type="button" class="btn btn-secondary btn-sm" (click)="closeRecord()">Close</button>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-danger btn-sm" (click)="deleteData()">Confirm</button>
      </div>
    </div>
  </div>
</ngx-smart-modal>
