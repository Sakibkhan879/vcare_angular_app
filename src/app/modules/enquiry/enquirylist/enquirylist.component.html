<div class="main-content-inner">
  <div class="col-12 mt-4">
    
  <div class="row mb-4 text-center" *ngIf="enquiryStats.length > 0" >
  <div class="col-md-3" *ngFor="let x of enquiryStats">
    <div class="card shadow-sm border-0" >
      <div class="card-header text-white font-weight-bold" style="background-color: #e5933f;">{{x.program}}</div>
      <div class="card-body py-2"><h5>{{ x.programcount || 0 }}</h5></div>
    </div>
  </div>

</div>

    <div class="row mt-3">
      <div class="col-lg-10 col-md-9 col-sm-9 mt-0">
        <h5 style="color:rgba(31, 97, 141);">
          Manage Enquiry
        </h5>
      </div>
      <div class="col-lg-2 col-md-3 col-sm-3 mt-2 margin-btn-xs ml-0 pl-0 text-right">
        <button type="submit" class="btn btn-success btn-sm mb-2" (click)="addEnquiryItem()">Create Enquiry</button>
      </div>
    </div>

    <div class="data-tables mt-2">
      <table id="dataTable" class="erp-datatable table table-bordered table-hover text-center">
        <thead class="bg-light text-capitalize">
          <tr>
            <th>Enquiry Number</th>
            <th>Student Name</th>

            <th>Contact No</th>
            <th>Date</th>
            <th>Last Contacted</th>
            <th style="width:100px;">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let details of enquiryDetails; index as i">
            <td>{{details.enquirynumber}}</td>
            <td>{{details.studentname}}</td>

            <td>{{details.mobileno}}</td>
            <td>{{details.enquirydate}}</td>
            <td>{{details.lastcontacted}}</td>
            <td>
              <ul class="d-flex justify-content-center list-unstyled mb-0">
                <li class="mr-2">
                  <a href="javascript:void(0)" (click)="editPage(details)" class="text-secondary"><i class="fa fa-edit"></i></a>
                </li>
                <li>
                  <a href="javascript:void(0)" (click)="openDeleteModel(details)" class="text-danger"><i class="ti-trash"></i></a>
                </li>
              </ul>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<ngx-smart-modal [customClass]="'nsm-centered'" #deleteModalPopup identifier="deleteModalPopup">
  <div class="modal-content border-0">
    <div class="modal-body text-center">
      <h6 class="mt-3">Do you want to delete this enquiry record?</h6>
    </div>
    <div class="row mt-3 mb-3 justify-content-center">
      <div class="col-auto">
        <button type="button" class="btn btn-secondary btn-sm" (click)="closeRecord()">Close</button>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-danger btn-sm" (click)="deleteData()">Confirm</button>
      </div>
    </div>
  </div>
</ngx-smart-modal>
